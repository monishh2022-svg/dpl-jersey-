<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DPL Jersey Selection</title>
<style>
body { background:#111; color:#fff; font-family:sans-serif; }
.card { margin:10px; padding:10px; background:#222; }
.locked { border:1px solid green; }
</style>
</head>

<body>

<h2>DPL Jersey Selection</h2>
<div id="app"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzqTuJ7ZN31ZbOK5LZ3jfTlDi83RqflO233OJf9a4QpVKcVMSJ2Tj-Yc3d0U6_Zn1P_UQ/exec";

const COLOURS = ["Red","Blue","Green","Yellow","Orange","Purple"];
const TEAMS = ["Team A","Team B","Team C","Team D"];

let selections = {};

// LOAD DATA
async function loadData() {
  try {
    const res = await fetch(API_URL + "?t=" + Date.now());
    const text = await res.text();

    // 🔥 IMPORTANT FIX (handle HTML error response)
    if (text.startsWith("<")) {
      alert("Apps Script not deployed properly (HTML returned)");
      return;
    }

    selections = JSON.parse(text);
    render();

  } catch (e) {
    alert("GET ERROR: " + e);
  }
}

// RENDER UI
function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  const used = new Set(Object.values(selections));

  TEAMS.forEach(team => {
    const selected = selections[team];

    let options = `<option value="">Select</option>`;
    COLOURS.forEach(c => {
      const taken = used.has(c) && c !== selected;
      options += `<option value="${c}" ${selected===c?'selected':''} ${taken?'disabled':''}>${c}</option>`;
    });

    const div = document.createElement("div");
    div.className = "card" + (selected ? " locked" : "");

    div.innerHTML = `
      <b>${team}</b>
      <select onchange="pick('${team}', this)" ${selected?'disabled':''}>
        ${options}
      </select>
    `;

    app.appendChild(div);
  });
}

// PICK
async function pick(team, el) {
  const colour = el.value;

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ team, colour })
    });

    const text = await res.text();

    if (text.startsWith("<")) {
      alert("POST failed - check deployment");
      return;
    }

    const data = JSON.parse(text);

    if (data.status === "error") {
      alert(data.message);
      el.value = "";
      return;
    }

    selections[team] = colour;
    render();

  } catch (e) {
    alert("POST ERROR: " + e);
  }
}

loadData();
</script>

</body>
</html>
